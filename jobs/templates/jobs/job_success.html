{% extends 'jobs/base.html' %}
{% block title %}Job Submitted - McCann{% endblock %}

{% block content %}
<div style="text-align:center;padding:60px 20px;">
    <div style="width:72px;height:72px;border-radius:50%;background:#f0fdf4;border:2px solid #86efac;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;">✓</div>
    <h1 style="font-size:22px;font-weight:700;color:#0f172a;margin-bottom:8px;">Job record submitted!</h1>
    <p style="font-size:14px;color:#64748b;margin-bottom:6px;">{{ job.works_order_ref }} has been sent to the QS for review.</p>
    <p style="font-size:15px;color:#15803d;font-weight:700;font-family:'Courier New',monospace;">Estimated total: £{{ job.total_cost }}</p>

    <div style="margin-top:32px;display:flex;gap:12px;justify-content:center;">
        <a href="/" class="btn btn-primary" style="width:auto;padding:10px 24px;font-size:14px;">+ New job record</a>
        <a href="/dashboard/" class="btn btn-secondary">View QS dashboard</a>
    </div>
</div>
{% endblock %}
